version: "3.8"

services:
  api:
    build:
      context: ./app
      dockerfile: Dockerfile

    ports:
      - "8000:8000"
    volumes:
      - ./app:/app
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    networks:
      - observability-net

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - observability-net

networks:
  observability-net:
    driver: bridge
